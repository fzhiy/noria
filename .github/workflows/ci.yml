name: CI
on: [push, pull_request]

jobs:
  lint-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-save tsx typescript @types/node

      - name: TypeScript type-check
        run: npx tsc --noEmit --esModuleInterop --module nodenext --moduleResolution nodenext --target es2022 tools/*.ts 2>&1 || true

      - name: Lint demo wiki pages
        run: npx tsx tools/kb-lint.ts 2>&1 || true

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
